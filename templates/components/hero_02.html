<section class="hero relative overflow-hidden" id="home" style="min-height: 90vh;">
  <div class="absolute inset-0 z-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"></div>
  <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_30%_20%,hsla(var(--primary-hsl),0.15),transparent_50%),radial-gradient(circle_at_70%_80%,hsla(var(--secondary-hsl),0.1),transparent_50%)]"></div>
  <div class="relative z-10 max-w-7xl mx-auto px-5 py-24 md:py-32 flex flex-col md:flex-row items-center gap-16">
    <div class="flex-1">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-black mb-6 leading-tight" style="color: var(--text);">{{HERO_TITLE}}</h1>
      <p class="text-xl text-slate-400 mb-10 max-w-xl leading-relaxed">{{HERO_SUBTITLE}}</p>
      <div class="flex gap-4 flex-wrap">
        <a href="https://wa.me/{{WHATSAPP_NUMBER}}" target="_blank" class="px-8 py-4 rounded-2xl font-bold bg-white text-slate-900 shadow-xl hover:scale-105 transition-all duration-300">{{HERO_CTA_PRIMARY}}</a>
        <a href="#about" class="px-8 py-4 rounded-2xl font-bold border border-current hover:bg-slate-500/10 transition-all duration-300" style="color: var(--text);">Learn More</a>
      </div>
    </div>
    <div class="flex-1">
      <div class="aspect-square rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
        <img src="{{ABOUT_IMAGE}}" alt="{{BUSINESS_NAME}}" class="w-full h-full object-cover" style="opacity: 0.9;">
      </div>
    </div>
  </div>
</section>
