<section class="about py-24 px-5 relative overflow-hidden" id="about">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16 items-center">
    <div class="relative z-10">
      <span class="text-xs font-bold text-indigo-400 tracking-wider uppercase mb-3 block">About Us</span>
      <h2 class="text-3xl sm:text-5xl font-extrabold text-white mb-6 leading-tight">{{ABOUT_TITLE}}</h2>
      <p class="text-slate-400 text-base sm:text-lg mb-8 leading-relaxed">{{ABOUT_DESCRIPTION}}</p>
      <div class="grid grid-cols-2 gap-6">
        <div class="p-6 bg-slate-900/50 rounded-2xl border border-slate-800">
          <div class="text-3xl font-black text-white mb-2">{{ABOUT_XP_YEARS}}</div>
          <div class="text-xs text-slate-500 uppercase tracking-wide">Years Experience</div>
        </div>
        <div class="p-6 bg-slate-900/50 rounded-2xl border border-slate-800">
          <div class="text-3xl font-black text-white mb-2">100%</div>
          <div class="text-xs text-slate-500 uppercase tracking-wide">Satisfaction</div>
        </div>
      </div>
    </div>
    <div class="relative">
      <div class="aspect-[4/3] rounded-3xl overflow-hidden border border-slate-800 shadow-2xl">
        <img src="{{ABOUT_IMAGE}}" alt="{{BUSINESS_NAME}}" class="w-full h-full object-cover">
      </div>
    </div>
  </div>
</section>
