<section class="gallery py-24 px-5" id="gallery">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-16">
      <span class="text-xs font-bold text-indigo-400 tracking-wider uppercase mb-3 block">Our Work</span>
      <h2 class="text-3xl sm:text-5xl font-extrabold  mb-4" style=\"color: var(--text);\">Visual Showcase</h2>
      <p class="text-slate-400 max-w-2xl mx-auto">Explore our signature highlights</p>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
      {{GALLERY_ITEMS}}
    </div>
  </div>
</section>
