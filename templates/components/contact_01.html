<section class="contact py-24 px-5 relative" id="contact">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-16">
      <span class="text-xs font-bold text-indigo-400 tracking-wider uppercase mb-3 block">Get In Touch</span>
      <h2 class="text-3xl sm:text-5xl font-extrabold text-white mb-4">Contact Us</h2>
      <p class="text-slate-400 max-w-2xl mx-auto">We'd love to hear from you</p>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      <div class="space-y-6">
        <div class="p-8 bg-slate-900/40 rounded-2xl border border-slate-800">
          <h3 class="text-xl font-bold text-white mb-6">Visit Us</h3>
          <div class="flex items-start gap-4 mb-6">
            <span class="text-2xl">📍</span>
            <p class="text-slate-300">{{BUSINESS_ADDRESS}}</p>
          </div>
          <div class="flex items-start gap-4 mb-6">
            <span class="text-2xl">📞</span>
            <p class="text-slate-300">{{BUSINESS_PHONE}}</p>
          </div>
          <div class="flex items-start gap-4">
            <span class="text-2xl">⏰</span>
            <p class="text-slate-300">{{BUSINESS_HOURS}}</p>
          </div>
        </div>
        <a href="https://wa.me/{{WHATSAPP_NUMBER}}" target="_blank" class="w-full py-4 rounded-xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 text-white text-center hover:scale-105 transition-all duration-300">
          💬 Chat on WhatsApp
        </a>
      </div>
      <div class="rounded-2xl overflow-hidden border border-slate-800 min-h-[400px] relative">
        {{MAPS_IFRAME}}
      </div>
    </div>
  </div>
</section>
