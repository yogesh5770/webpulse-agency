<section class="hero" id="home" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; background: radial-gradient(circle at top right, hsla(var(--primary-hsl), 0.1), transparent), radial-gradient(circle at bottom left, hsla(var(--secondary-hsl), 0.05), transparent);">
  <div style="max-width: 800px; margin-top: 40px;">
    <h1 style="font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: -0.02em;">
      {{HERO_TITLE}}
    </h1>
    <p style="font-size: clamp(1.1rem, 2vw, 1.3rem); opacity: 0.85; max-width: 600px; margin: 0 auto 2.5rem; font-weight: 400; line-height: 1.5;">
      {{HERO_SUBTITLE}}
    </p>
    <div style="display: flex; gap: 1rem; justify-content: center; align-items: center;">
      <a href="https://wa.me/{{WHATSAPP_NUMBER}}" target="_blank" class="cta-btn" style="padding: 14px 32px; font-size: 1rem;">
        {{HERO_CTA_PRIMARY}}
      </a>
      <a href="#services" class="btn" style="background: transparent; color: var(--text); border: 1px solid var(--border); padding: 13px 31px; border-radius: var(--radius); text-decoration: none; font-weight: 600; transition: background 0.2s;">
        Explore Menu
      </a>
    </div>
  </div>
</section>
