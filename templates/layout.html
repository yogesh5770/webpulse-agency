<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{BUSINESS_NAME}} | {{BUSINESS_CATEGORY}}</title>
  <meta name="description" content="{{SEO_DESCRIPTION}}">
  <meta name="keywords" content="{{SEO_KEYWORDS}}">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family={{FONTS_IMPORT}}&display=swap" rel="stylesheet">
  <!-- CDNs: Tailwind v4 + GSAP -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <style>
    :root {
      --primary-hsl: {{PRIMARY_HSL}};
      --secondary-hsl: {{SECONDARY_HSL}};
      --bg-hsl: {{BG_HSL}};
      --text-hsl: {{TEXT_HSL}};
      --accent-hsl: {{ACCENT_HSL}};
      --radius: {{RADIUS}};
      --font-family: {{FONT_FAMILY}};
      
      --primary: hsl(var(--primary-hsl));
      --secondary: hsl(var(--secondary-hsl));
      --bg: hsl(var(--bg-hsl));
      --text: hsl(var(--text-hsl));
      --accent: hsl(var(--accent-hsl));
      
      --card-bg: hsla(0, 0%, 100%, 0.03);
      --border: hsla(0, 0%, 100%, 0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-family), system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    /* Premium Glassmorphic Navigation */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      background: hsla(var(--bg-hsl), 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; color: var(--primary); }
    
    .cta-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: 0;
      padding: 10px 22px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(var(--primary-hsl), 0.3);
    }
    
    /* Layout Sections */
    section { padding: 100px 5%; position: relative; }
    .section-header { text-align: center; margin-bottom: 60px; }
    .section-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--text), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .section-subtitle {
      font-size: 1.1rem;
      opacity: 0.7;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Grid system */
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
    
    /* Premium Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      border-color: var(--primary);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }
    
    /* Footer */
    .footer {
      background: hsla(var(--bg-hsl), 0.9);
      border-top: 1px solid var(--border);
      padding: 60px 5% 40px;
      text-align: center;
    }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; list-style: none; }
    .footer-links a { color: var(--text); opacity: 0.7; text-decoration: none; }
    .footer-links a:hover { opacity: 1; }
    .footer-copy { font-size: 0.85rem; opacity: 0.5; }
    
    /* Sticky WhatsApp Floating CTA */
    .whatsapp-float {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background-color: #25d366;
      color: white;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 999;
      text-decoration: none;
      font-size: 24px;
      transition: transform 0.3s;
    }
    .whatsapp-float:hover { transform: scale(1.1); }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="#" class="logo">{{BUSINESS_NAME}}</a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#gallery">Gallery</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <a href="https://wa.me/{{WHATSAPP_NUMBER}}" class="cta-btn" target="_blank">Book Now</a>
  </nav>

  <!-- Dynamic Compiled Sections -->
  {{COMPILER_SECTIONS}}

  <!-- Footer -->
  <footer class="footer">
    <div style="margin-bottom: 2rem;">
      <a href="#" class="logo">{{BUSINESS_NAME}}</a>
    </div>
    <ul class="footer-links">
      <li><a href="#about">About Us</a></li>
      <li><a href="#services">Our Services</a></li>
      <li><a href="#gallery">Photo Gallery</a></li>
      <li><a href="#contact">Contact Us</a></li>
    </ul>
    <div class="footer-copy">
      &copy; <script>document.write(new Date().getFullYear())</script> {{BUSINESS_NAME}}. All Rights Reserved.
    </div>
  </footer>

  <a href="https://wa.me/{{WHATSAPP_NUMBER}}" class="whatsapp-float" target="_blank" aria-label="Chat on WhatsApp">💬</a>

  <!-- GSAP & Scroll Reveal Animations -->
  <script>
    // GSAP Hero Reveal
    window.addEventListener('DOMContentLoaded', () => {
      if (typeof gsap !== 'undefined') {
        gsap.from(".hero h1", { duration: 1.2, y: 50, opacity: 0, ease: "power4.out" });
        gsap.from(".hero p", { duration: 1.2, y: 30, opacity: 0, delay: 0.2, ease: "power4.out" });
        gsap.from(".hero .cta-btn, .hero .btn", { duration: 1, scale: 0.9, opacity: 0, delay: 0.4, stagger: 0.1, ease: "back.out(1.7)" });
      }
      
      // Scroll Reveal Observer
      const sections = document.querySelectorAll('section');
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = 1;
            entry.target.style.transform = 'translateY(0)';
          }
        });
      }, { threshold: 0.1 });
      
      sections.forEach(sec => {
        if (!sec.classList.contains('hero')) {
          sec.style.opacity = 0;
          sec.style.transform = 'translateY(40px)';
          sec.style.transition = 'opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
          observer.observe(sec);
        }
      });
    });
  </script>

</body>
</html>
